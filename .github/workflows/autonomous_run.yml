name: ZenithPress AI Autonomous Article Publisher

on:
  schedule:
    # Runs automatically twice a day (at 8:00 AM and 8:00 PM UTC)
    # Fully automated and 100% FREE on GitHub Actions free tier!
    - cron: '0 8,20 * * *'
  workflow_dispatch:
    # Allows you to click "Run Workflow" in your GitHub Actions tab to trigger manually anytime!

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the Git Repository
    - name: Checkout Codebase
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    # Step 2: Set up Python Environment
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    # Step 3: Install Required Dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    # Step 4: Run the Smart AI Automation Pipeline
    - name: Harvest Trends & Generate Monetized Articles
      env:
        # These keys will be securely added to your GitHub Repository Secrets!
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
        GOOGLE_SHEET_WEBAPP_URL: ${{ secrets.GOOGLE_SHEET_WEBAPP_URL }}
      run: |
        python backend/main.py

    # Step 5: Commit and Push the generated articles & visual assets back to GitHub
    # Vercel detects this push and redeploys your beautiful site automatically in 15 seconds!
    - name: Commit and Deploy to Vercel
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "ZenithPress AI Publisher"
        
        # Add generated static JSON data and FLUX cover images
        git add frontend/public/data/articles.json || true
        git add frontend/public/assets/ || true
        
        # Commit if changes exist
        if git diff --staged --quiet; then
          echo "No new trending articles to publish at this time."
        else
          git commit -m "Auto-publish trending tech & AI articles [autonomous run]"
          git push origin main
        fi
